# Feature Development Stage Policy
# This file customizes how the built-in feature-development workflow behaves in this project.
# The framework still owns routing, phase order, and mandatory safety stages.
#
# Enforcement tiers (issue #368) — an escalation is honoured on one of two tiers, and
# this contract never claims script enforcement it does not have:
#   - SCRIPT-ENFORCED (deterministic, cannot be bypassed by the agent): checks.block_on_failure
#     — `paqad-ai checks run` exits non-zero on any red command, and the completion backstop
#     reads its report; a change with no report reads Inconclusive, never a vacuous pass.
#     Missing mandatory stages are likewise script-enforced by the stage-evidence completion gate.
#   - AGENT-RAISED -> DECISION-PAUSE-ENFORCED (the agent must detect the finding; the
#     framework then blocks its RESOLUTION): review.escalation.review_findings and
#     documentation_sync.escalation.stale_docs. These need model judgment to raise, so no
#     script detects them; once raised as a `stop`, the Decision-Pause gate holds edits until
#     the packet resolves. They are NOT a false "a script proves this" promise.
schema_version: "1"
merge_mode: append

stages:
  planning:
    # Extra context to load before planning starts.
    read:
      - docs/modules/**
      - docs/instructions/**
      - docs/instructions/design-system/**
    instructions:
      - Review the canonical module and instruction docs before planning the change.
      - Keep planning scoped to the requested feature and the current repository state.
      - "Attribution Gate (issue #80): before producing an implementation sequence, run module-attribution-extractor against the active request. If it returns zero candidates, fall through to module-attribution-inferencer. Surface every needs-decision packet via the Decision Pause Contract and await an explicit user response — no silent acceptance. Accepted decisions are applied to module-map.yml via src/module-decisions/apply.ts (the only writer of the map). Only after the gate resolves may planning continue."
      - "Design-system (issue #76): if the change touches UI, plan against the design system. Identify tokens, components, and states involved. Flag additions that require extending docs/instructions/design-system/* before extending the code. Missing design-system contract degrades planning to bare-minimum mode (warn, not stop)."
      - "Rules-as-scripts (issue #89): invoke rule-script-reconciler at planning entry. RS-* drift (rules edited without script regen, manual map edits, failing fixtures) surfaces via the Decision Pause Contract. Resolve per escalation.rule_scripts_stale before planning continues."
    required_inputs:
      - active request
      - canonical docs
    strictness:
      require_docs_context: true
      require_attribution_gate: true
      require_rule_scripts_synced: true
    escalation:
      missing_docs_context: warn
      attribution_pending: stop
      missing_design_system: warn
      rule_scripts_stale: ask
      rule_scripts_missing: warn
    artifacts:
      - implementation sequence
      - module attribution decisions
    attribution_gate:
      # Ordered pipeline; each step short-circuits the next when it produces a
      # needs-decision packet. See runtime/base/skills/module-attribution-{extractor,inferencer}.
      pipeline:
        - skill: module-attribution-extractor
          on_no_decision: continue
        - skill: module-attribution-inferencer
          when: extractor_returned_empty
          on_confident: continue
          on_not_confident: ask
        - apply: src/module-decisions/apply.ts
          when: decision_accepted

  specification:
    instructions:
      - Write or refine the feature specification before implementation when the lane includes specification.
      - "Design-system (issue #76): if the feature includes new or changed UI, the spec must declare component states, breakpoints exercised, and the a11y contract (WCAG criteria the change must satisfy). This extends the spec-quality-review rubric — incomplete UI contracts surface as findings during review."
      - "Spec sign-off (issue #102): on graduated/full lanes the spec must carry behaviour, acceptance criteria (AC-n, given/when/then, proof_type), and human-confirmed invariants (INV-n), and must be frozen before development. Freeze requires no open questions, no critical spec-review defects, and a confirmed invariant set. A mid-build goal change or a work-vs-spec contradiction surfaces via the Decision Pause Contract (spec.change / spec.contradiction) and is never resolved silently. require_spec_signoff is framework-owned and cannot be downgraded by a project override."
      - "Spec-review enforcement (issue #401): SCRIPT-ENFORCED. `paqad-ai spec freeze` runs the spec-quality review itself and refuses to freeze while a critical defect is open, so never run `compliance review` by hand to satisfy the clause above. Major and minor findings never block. The defect summary is folded into the bundle's specification.json and no .paqad/compliance/<slug>/spec-review.json is written by this workflow. Author the spec markdown inside the project: a path resolving outside the project root is rejected."
    required_inputs:
      - approved spec boundary
    strictness:
      require_spec: true
      require_spec_signoff: true
    escalation:
      missing_spec: stop
      missing_spec_signoff: stop
    artifacts:
      - specification
      - frozen feature-spec

  development:
    instructions:
      - Implement only the requested feature behavior and avoid unrelated refactors.
      - "Design-system (issue #76): when the diff touches UI source, run token-conformance-review and component-conformance-review as pre-review lint (non-blocking at this stage). Hard-coded design values (hex, raw px/rem, ad-hoc font stacks) where a token exists surface as developer-visible DT findings before review."
    required_inputs:
      - approved spec
      - implementation sequence
    strictness:
      avoid_unrelated_refactors: true
    escalation:
      scope_expansion: ask
    artifacts:
      - code changes

  review:
    instructions:
      - Review the change against correctness, regressions, and rollback risk before treating it as complete.
      - "Rigid review artifact (issue #402): record the review with `paqad-ai review record <template.json>`, which writes review.json into the active feature's bundle, and end the review stage against that file. A stage-end naming anything else records inconclusive, and nothing may be written into a feature bundle directory."
      - "Design-system (issue #76): on UI diffs, run ux-heuristic-evaluation and design-system-coverage against the changed surfaces. DT-blocker findings are review-blocking."
    required_inputs:
      - code diff
      - verification summary
    strictness:
      require_review: true
    escalation:
      # AGENT-RAISED -> DECISION-PAUSE-ENFORCED (issue #368): a blocking review finding
      # needs model judgment to detect — no script re-judges the diff. Once the agent
      # raises it as a `stop`, the Decision-Pause gate holds further edits until resolved.
      # Not a script-detected gate; honestly an agent obligation with a script-enforced
      # resolution.
      review_findings: stop
    artifacts:
      - review.json

  checks:
    instructions:
      - Run the project command checks after implementation and before finalizing the feature.
      - Verify test coverage is 100%
      - "Module-health rollup (issue #80, Phase 3): after format / test / build pass, invoke `paqad-ai module-health rollup` (or `module-health sync --from-report <path>` when CI has already produced a report). The rollup parses the active stack pack's coverage + test reports, attributes rows to module slugs via module-map.yml, and writes .paqad/module-health/<slug>.json with blocked_metrics populated. Surface any rollup-blocked metrics to the user as informational warnings — they're configuration gaps, not decision packets."
      - "Design-test (issue #76): invoke the design-test runner diff-scoped — only UI files in the diff + routes whose components changed (1-level transitive closure). If contract files (docs/instructions/design-system/*) changed, escalate to whole-app. Block on DT-blocker findings; non-blockers surface as warnings. Strict mode (design_test.strict in project-profile.yaml) is explicit opt-in only — never auto-engaged at Strong tier."
    required_inputs:
      - working tree diff
    strictness:
      block_on_failure: true
    escalation:
      missing_command_mapping: stop
    artifacts:
      - verification summary
      - module-health rollup report
      - design-test report
    checks:
      use_project_profile_commands: true
      commands:
        - format
        - test
        - build
      shell_commands: []
      # SCRIPT-ENFORCED (issue #368): `paqad-ai checks run` exits non-zero on any red
      # command and persists a report the completion backstop reads. A feature-dev change
      # with no report reads Inconclusive (never a vacuous "Safe to merge"), and a red
      # report fails the completion verdict. This is a deterministic gate, not AI-trusted.
      block_on_failure: true
      # Add project-specific commands here when needed.
      # shell_commands:
      #   - pnpm typecheck
    module_health_rollup:
      # Issue #80 Phase 3 — runs after format/test/build. Best-effort: when
      # the active pack has no module_health block the rollup hard-fails
      # with `blocked: module_health_unknown`; the workflow surfaces that as
      # a warning (not a stop) because Phase 3 ships every shipped pack with
      # a block, so a missing block means the project is on a custom pack
      # without the new shape.
      enabled: true
      command: paqad-ai module-health rollup --project-root . --silent
      escalation: warn
    # Rules-as-scripts gate (issue #89). Runs registered rule scripts diff-scoped
    # after the command checks + module-health rollup. deterministic findings
    # block under mode:strict; heuristic findings route to review and never block.
    rule_compliance:
      enabled: true
      mode: strict
      scope: changed-files
      diff_scope: true
      cache_path: .paqad/scripts/rules/.cache/report.json
      escalation: stop

  documentation_sync:
    instructions:
      - Sync canonical docs affected by the feature diff after verification passes.
      - "Design-system (issue #76): when the diff adds a token, component, or breakpoint to source, invoke design-system-sync to propose contract updates to docs/instructions/design-system/*. Proposals are surfaced via the Decision Pause Contract — never auto-applied."
    required_inputs:
      - changed files
    strictness:
      require_canonical_sync: true
    escalation:
      # AGENT-RAISED -> DECISION-PAUSE-ENFORCED (issue #368): stale-doc detection needs
      # judgment about which docs a change makes stale — no script proves it. Raised as a
      # `stop`, the Decision-Pause gate then holds edits until resolved. Honestly an agent
      # obligation with a script-enforced resolution, not a script-detected gate.
      stale_docs: stop
    artifacts:
      - stale doc targets
