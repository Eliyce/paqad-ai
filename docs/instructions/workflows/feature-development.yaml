# Feature Development Stage Policy
# This file customizes how the built-in feature-development workflow behaves in this project.
# The framework still owns routing, phase order, and mandatory safety stages.
schema_version: "1"
merge_mode: append

stages:
  planning:
    # Extra context to load before planning starts.
    read:
      - docs/modules/**
      - docs/instructions/**
    instructions:
      - Review the canonical module and instruction docs before planning the change.
      - Keep planning scoped to the requested feature and the current repository state.
      - "Attribution Gate (issue #80): before producing an implementation sequence, run module-attribution-extractor against the active request. If it returns zero candidates, fall through to module-attribution-inferencer. Surface every needs-decision packet via the Decision Pause Contract and await an explicit user response — no silent acceptance. Accepted decisions are applied to module-map.yml via src/module-decisions/apply.ts (the only writer of the map). Only after the gate resolves may planning continue."
    required_inputs:
      - active request
      - canonical docs
    strictness:
      require_docs_context: true
      require_attribution_gate: true
    escalation:
      missing_docs_context: warn
      attribution_pending: stop
    artifacts:
      - implementation sequence
      - module attribution decisions
    attribution_gate:
      # Ordered pipeline; each step short-circuits the next when it produces a
      # needs-decision packet. See runtime/base/skills/module-attribution-{extractor,inferencer}.
      pipeline:
        - skill: module-attribution-extractor
          on_no_decision: continue
        - skill: module-attribution-inferencer
          when: extractor_returned_empty
          on_confident: continue
          on_not_confident: ask
        - apply: src/module-decisions/apply.ts
          when: decision_accepted

  specification:
    instructions:
      - Write or refine the feature specification before implementation when the lane includes specification.
    required_inputs:
      - approved spec boundary
    strictness:
      require_spec: true
    escalation:
      missing_spec: stop
    artifacts:
      - specification

  development:
    instructions:
      - Implement only the requested feature behavior and avoid unrelated refactors.
    required_inputs:
      - approved spec
      - implementation sequence
    strictness:
      avoid_unrelated_refactors: true
    escalation:
      scope_expansion: ask
    artifacts:
      - code changes

  review:
    instructions:
      - Review the change against correctness, regressions, and rollback risk before treating it as complete.
    required_inputs:
      - code diff
      - verification summary
    strictness:
      require_review: true
    escalation:
      review_findings: stop
    artifacts:
      - review summary

  checks:
    instructions:
      - Run the project command checks after implementation and before finalizing the feature.
      - Verify test coverage is 100%
      - "Module-health rollup (issue #80, Phase 3): after format / test / build pass, invoke `paqad-ai module-health rollup` (or `module-health sync --from-report <path>` when CI has already produced a report). The rollup parses the active stack pack's coverage + test reports, attributes rows to module slugs via module-map.yml, and writes .paqad/module-health/<slug>.json with blocked_metrics populated. Surface any rollup-blocked metrics to the user as informational warnings — they're configuration gaps, not decision packets."
    required_inputs:
      - working tree diff
    strictness:
      block_on_failure: true
    escalation:
      missing_command_mapping: stop
    artifacts:
      - verification summary
      - module-health rollup report
    checks:
      use_project_profile_commands: true
      commands:
        - format
        - test
        - build
      shell_commands: []
      block_on_failure: true
      # Add project-specific commands here when needed.
      # shell_commands:
      #   - pnpm typecheck
    module_health_rollup:
      # Issue #80 Phase 3 — runs after format/test/build. Best-effort: when
      # the active pack has no module_health block the rollup hard-fails
      # with `blocked: module_health_unknown`; the workflow surfaces that as
      # a warning (not a stop) because Phase 3 ships every shipped pack with
      # a block, so a missing block means the project is on a custom pack
      # without the new shape.
      enabled: true
      command: paqad-ai module-health rollup --project-root . --silent
      escalation: warn

  documentation_sync:
    instructions:
      - Sync canonical docs affected by the feature diff after verification passes.
    required_inputs:
      - changed files
    strictness:
      require_canonical_sync: true
    escalation:
      stale_docs: stop
    artifacts:
      - stale doc targets
