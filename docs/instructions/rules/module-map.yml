  - slug: compliance-engine
    name: Spec Compliance Engine
    layer: framework-internals
    confidence: high
    summary: |
      Parses structured Markdown specs into deterministic obligation
      indexes, scans tests for explicit `@obligation` evidence, generates
      failing Vitest skeletons, and validates index schema + duplicate IDs.
    sources:
      - src/compliance

  - slug: traceability-engine
    name: Bidirectional Traceability Engine
    layer: framework-internals
    confidence: high
    summary: |
      Rebuilds a two-way promise ↔ code ↔ test map from reality each run by
      joining the compliance forward link (spec→test), the module map, the
      import graph, and verification-evidence `ac_id`. Flags promises with no
      proving check (TR-UNTESTED-PROMISE) and code that answers to no promise
      and that nothing-with-a-promise uses (TR-CODE-ORPHAN, by reachability —
      not a label). Writes `.paqad/traceability/map.json`.
    sources:
      - src/traceability

  - slug: quality-ratchet
    name: Quality Ratchet
    layer: framework-internals
    confidence: high
    summary: |
      Records four quality measures at the project's real level today
      (`.paqad/quality-baseline.json`) and from then on only allows a change
      that keeps each measure equal or better. Measures — tangledness, dead/
      unused code (consumed from #109's reachability output, not re-scanned),
      risky patterns, and strictness — are normalised to a deficiency count
      (lower is better) and rolled up per module + project. A verification gate
      refuses any worsening; the recorded level only ever tightens, except a
      legitimate regression approved once via the `quality.ratchet_exception`
      Decision Pause and reused for the same kind.
    sources:
      - src/quality-ratchet

