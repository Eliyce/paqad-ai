  - slug: cli-audit
    name: Trust Export Commands (audit + evidence)
    layer: cli-commands
    confidence: high
    summary: |
      The two read-only, local-first exporters that turn the #118 unified
      evidence ledger into something an outside system can consume. `audit
      export` is the SIEM projector — OCSF (primary), Elastic ECS, ArcSight
      CEF, and a canonical JSONL passthrough — writing a file or stdout for
      the customer's own collector to ship (no paqad-hosted endpoint, stream,
      or network push; `--since` windows it, `--redact` strips free-text
      detail and human identities). `evidence` renders the same verification
      evidence as a scannable PR comment (Markdown or JSON) for a human
      reviewer at merge time.
    sources:
      - src/cli/commands/audit.ts
      - src/cli/commands/evidence.ts
      - src/audit
      - src/evidence
    features:
      - slug: audit-export
        name: paqad-ai audit export
        sources: [src/cli/commands/audit.ts, src/audit]
