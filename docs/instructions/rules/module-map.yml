  - slug: background-harness
    name: Background-Worker Harness
    layer: framework-internals
    confidence: high
    summary: |
      The "never block coding" keystone (RAG buildout F1). One reusable
      mechanism to keep any precomputed artifact fresh in a detached worker
      while the prompt path only ever reads the finished artifact: a
      debounce marker that coalesces a burst of prompts, a single-flight
      `mkdir` lock that serialises workers and reclaims a crashed worker's
      stale lock, a detached `spawn`/`unref` that returns in well under the
      hook time budget, and a build-to-temp + atomic-rename swap so a reader
      never sees a half-written artifact. Smart rule loading, the
      branch-aware vector index sync, and the codebase-memory tier all ride
      on it.
    sources:
      - src/background
    features:
      - slug: trigger-refresh
        name: Trigger Refresh (debounce → single-flight → detached spawn)
      - slug: single-flight-lock
        name: Single-Flight Lock (mkdir + stale reclaim)
      - slug: debounce-marker
        name: Debounce Marker (burst coalescing)
      - slug: atomic-artifact-swap
        name: Atomic Artifact Swap (build-to-temp + rename)
    evidence:
      symbols:
        - LockOutcome
        - RefreshJobSpec
        - TriggerDeps
        - TriggerResult
        - WorkerCommand
        - atomicWriteFile
        - buildAndSwap
        - releaseLock
        - runRefreshJob
        - shouldDebounce
        - spawnDetachedWorker
        - touchMarker
        - triggerRefresh
        - tryAcquireLock

  - slug: context-seam
    name: Context Injection Seam
    layer: framework-internals
    confidence: high
    summary: |
      The session-time delivery channel for everything paqad wants in front
      of the model (RAG buildout F2). A `UserPromptSubmit` hook reads a
      precomputed context artifact off disk and emits it as a
      `[paqad-context]` block on stdout, so the host injects it into the
      model context before the turn. The seam does no heavy work — only a
      stat + read of a finished artifact under a hard time budget (the
      background harness keeps the artifact fresh). Smart rule loading,
      wired retrieval, stage gating, and the codebase-memory tier all ride
      on this one channel. A missing, empty, disabled, or too-slow artifact
      emits nothing, so the agent falls back to grep/read exactly as today.
    sources:
      - runtime/scripts/context-seam.mjs
      - runtime/hooks/context-seam-inject.mjs
    features:
      - slug: budgeted-read
        name: Budgeted Artifact Read (resolve + read + ceiling)
      - slug: context-block-emit
        name: Context Block Emit ([paqad-context] + hook wiring)
    evidence:
      symbols:
        - BLOCK_CLOSE
        - BLOCK_OPEN
        - CONTEXT_ARTIFACT_RELPATH
        - DEFAULT_BUDGET_MS
        - DEFAULT_MAX_BYTES
        - buildInjection
