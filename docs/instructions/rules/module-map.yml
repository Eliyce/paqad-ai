version: 2
generatedAt: 2026-05-22
confidence: high
notes: |
  paqad-ai is a documentation-first npm package that helps LLM coding agents
  (Claude Code, Codex, Cursor, Copilot, etc.) work effectively in any project.
  It ships two product surfaces:

    1. cli-commands       — what a human runs in the terminal. No LLM in loop.
                            Scaffolds project metadata, docs, rules, adapter
                            entry files, RAG indexes, graphs, etc.
    2. agent-workflows    — what an LLM does when it loads the adapter entry
                            file (CLAUDE.md / AGENTS.md / .cursor/rules/…) and
                            follows the runtime rules, skills, and agent roles
                            shipped inside this package.

  Plus a third grouping:
    3. framework-internals — engines and runtime assets that power both
                             surfaces (workflow engine, skill runtime, RAG,
                             context intelligence, agent roles, packs, etc.).
                             These docs are written for paqad-ai contributors,
                             not end users.

  Every module's `layer:` field marks which group it belongs to. Stage 2
  (`create module documentation`) will use this file as the sole authority
  for slugs, feature names, and source paths.

