  - slug: delivery-workflow
    name: Provider-Agnostic Delivery Workflow
    layer: framework-internals
    confidence: high
    summary: |
      On-by-default delivery automation (issue #42) whose branch, CI, and
      ticket conventions are detected from the team's real git history rather
      than authored. The capability is two provider-neutral contracts —
      `TicketProvider` (tracker-neutral; Jira first) and `HostProvider` (VCS +
      code-host-neutral; GitHub first) — with vendors as adapters resolved by
      `src/providers/registry.ts`. A delivery-policy.yaml carries the detected
      conventions; a CI gate enforces them; graceful degradation kicks in when
      a provider is not connected.
    sources:
      - src/delivery
      - src/providers
      - docs/instructions/workflows/delivery-policy.yaml
