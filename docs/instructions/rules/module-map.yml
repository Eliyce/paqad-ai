  - slug: cli-dashboard
    name: Project Dashboard & Status Commands
    layer: cli-commands
    confidence: high
    summary: |
      Living single-pane "where am I on this project?" view (paqad-ai
      dashboard) plus the one-shot LLM-friendly snapshot of the same data
      (paqad-ai status). Score is existence + freshness only — no
      content-quality heuristics in phase 1. Shares the graph-ui bundle
      via a hash router so the graph view becomes one section inside the
      dashboard. Issue #146 adds the approvals inbox (resolve decision
      pauses and module proposals on the web through the same stores the
      agent uses), the read-only trust area (evidence timeline, DSSE
      receipt cards, AI-BOM, PR-comment export), the seven-area management
      IA (Pulse, Approvals, Trust, Build, Automation, Knowledge, Setup)
      with the comprehension layer (ownership badges, why sentences, why
      drawers, empty states), and the audited write pipeline behind the
      web editors.
