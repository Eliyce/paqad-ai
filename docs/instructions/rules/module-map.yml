      `.paqad/ledger/feature-evidence/<issue>-<slug>-<ULID>/` holding its whole
      workflow record plus its compliance bundle. Phase 1 lays the dark, unwired
      foundation: a path layer that resolves the layout, the `_session` control,
      and the `_chat` home and round-trips a dir name to its `{issue, slug, ulid}`
      parts; rigid framework-owned AJV schemas for `feature.json` and `plan.json`
