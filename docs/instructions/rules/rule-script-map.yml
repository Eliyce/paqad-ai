  - id: RL-c666
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**`[A-Z]` / `[a-z]` ranges are locale-dependent.** On some POSIX locales (seen on GitHub's macOS runner) `[A-Z]` collates as `aBcDeF...` and matches lowercase too. When the filter is meant to be \"uppercase only\" or \"lowercase only\", use an explicit byte set (`[ABCDEFGHIJKLMNOPQRSTUVWXYZ]`). `[A-Za-z]` is safe because it already covers both cases. This applies to **both bash `case` patterns and awk regexes**."
    text_hash: 46ffff5d97dfe25c4f60fd5c0cfa3f0879845f0bd9d40e9632a35fbef11548ea
