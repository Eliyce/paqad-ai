  - id: RL-3368
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**Predictable output size.** If output can grow unbounded, default to a summary and accept a flag (`--out`, `--limit`) for the full version. Many agent harnesses truncate around 10–30K characters."
