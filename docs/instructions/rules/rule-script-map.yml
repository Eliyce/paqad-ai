    scripts: []
  - id: RL-14a8
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**Stdout is structured.** Default to TSV (`<col1>\\t<col2>\\t...`); use JSON when the consumer is `node`/`jq` (e.g. live-phase results). Never mix data and diagnostics on stdout."
    text_hash: 0b4e1036c183b4d2dd9ad10df8d7b172ea201da0f380016614c9d34d918d85fd
