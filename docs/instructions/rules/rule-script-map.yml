  - id: RL-1458
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**`read` drops the last line when there's no trailing newline.** Always write `while IFS= ... read -r x || [ -n \"${x:-}\" ]; do ...; done` so a one-line input doesn't get silently skipped."
