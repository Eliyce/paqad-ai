    scripts: []
  - id: RL-f12d
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: '**Idempotent.** Agents retry. "Create if not exists" is safer than "create and fail on duplicate". Re-runs on the same input produce the same output (this includes stable id sequences — see `design-system-coverage/scripts/gap-report.sh`).'
