  - id: RL-411f
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**No `\\b` in awk.** POSIX awk regex has no word-boundary metachar. Use explicit boundary character classes like `(^|[^A-Za-z0-9_-])...([^A-Za-z0-9_-]|$)`."
