    scripts: []
  - id: RL-ce49
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**BSD grep's `(^|...)` alternation is fragile.** When `(^|[^class])foo` fails to match start-of-line cases on macOS, use the `[^class]?foo` zero-or-one quantifier instead and let post-processing in awk handle the rest."
    text_hash: 39538df0c9f01b9e4066bc41e1c2af7afb3aa7f23d7b8c523eef8a188c35f251
