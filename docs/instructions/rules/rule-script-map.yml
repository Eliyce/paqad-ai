    scripts: []
  - id: RL-ac27
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**One verb per script.** A script does one thing — `parse-X`, `extract-Y`, `derive-Z`, `diff-X`, `match-X-to-Y`, `propose-X`. If you find yourself naming a script `do-stuff`, split it."
    text_hash: 019cfcec6e65bf18c2a98666415120879be52c07aed8e004b2ec097f4f8fb9de
