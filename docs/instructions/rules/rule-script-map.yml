  - id: RL-5fcf
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**`set -euo pipefail`** at the top of every script. Pair with `|| true` on any subshell whose non-zero exit is non-fatal (e.g. `grep` that finds nothing)."
