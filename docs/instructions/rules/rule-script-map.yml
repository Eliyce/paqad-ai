    scripts: []
  - id: RL-20bd
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: '**Helpful error messages.** "Error: X is required. Usage: ..." — never bare "error: 1". The agent reads stderr to decide the next attempt.'
