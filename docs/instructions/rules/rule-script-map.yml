  - id: RL-77cc
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**awk's `match()` is case-sensitive even when grep used `-i`.** If you matched case-insensitively in grep, you must lowercase both sides in awk before calling `match()`, then map `RSTART`/`RLENGTH` back onto the original casing for reporting."
    text_hash: 48e1e5f320adb965b87fadfdc58e68d55bbbd1edbd6e1ccd6b2fbd5b2ce49252
