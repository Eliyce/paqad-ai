    enforced_by: []
    scripts: []
  - id: RL-6ac2
    source: docs/instructions/rules/_shared/skill-authoring.md
    text: "**`--help` exits 0** and documents `Usage`, accepted flags, output shape, and exit codes. Keep it terse — `--help` lands in the agent's context window every time."
    text_hash: fd2b9b55031b37bf100585edbd5a84c8947d9b6374b1190e8b7be71bfe2df337
