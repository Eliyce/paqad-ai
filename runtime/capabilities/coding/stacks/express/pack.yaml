name: express
display_name: Express
ecosystem: node
version: 1.0.0
description: Built-in Express coding stack pack
maintainer: paqad-ai
detection:
  priority: 40
  manifests:
    - file: package.json
      packages: [express]
traits:
  - name: tailwind
    display_name: Tailwind
    detect_package: tailwindcss
    description: Express app includes Tailwind assets
toolchains:
  - ecosystem: node
    package_managers: [pnpm, npm]
    lockfiles: [pnpm-lock.yaml, package-lock.json]
mcp_defaults:
  - name: database-inspector
    when: always
pentest:
  file_check_map:
    - glob: src/routes/**
      checks: [permission-boundary-review, business-logic-abuse-review]
    - glob: src/middleware/**
      checks: [permission-boundary-review, runtime-surface-probing]
    - glob: pnpm-lock.yaml
      checks: [dependency-advisory-triage]
  audit_commands:
    - command: pnpm audit --json
      parser: node
ast:
  language: typescript
  tree_sitter_grammar: tree-sitter-typescript
  file_extensions: ['.ts', '.js']
testing:
  frameworks:
    - name: vitest
      detect_package: vitest
      run_command: pnpm test
test_runners:
  - runner_id: vitest
    structured_format: tap
    structured_flags: --reporter=tap
    default_command: pnpm test
docs:
  conventions_template: rules/conventions.md
