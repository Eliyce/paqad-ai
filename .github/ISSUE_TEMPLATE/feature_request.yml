name: ✨ Feature request
description: Suggest a new capability, option, or improvement.
title: '[Feature]: '
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature.

        Before continuing:

        - Search [existing issues](https://github.com/Eliyce/paqad-ai/issues)
          and [Discussions](https://github.com/Eliyce/paqad-ai/discussions).
        - For open-ended ideas, please open a
          [Discussion](https://github.com/Eliyce/paqad-ai/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the user-facing pain. Avoid jumping to a solution.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would you like paqad-ai to do? Be as concrete as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Which area of paqad-ai does this affect?
      multiple: true
      options:
        - Onboarding and stack detection
        - Stack packs
        - Provider adapters (Claude Code, Cursor, Codex, Gemini, Junie, Antigravity, Copilot)
        - MCP defaults
        - RAG
        - Compliance and verification
        - Documentation generation
        - CLI ergonomics
        - Health and update flows
        - Patterns
        - Other / unsure

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
