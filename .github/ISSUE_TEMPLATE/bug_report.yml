name: 🐛 Bug report
description: Report something that does not work as documented or expected.
title: '[Bug]: '
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Before continuing:

        - Search [existing issues](https://github.com/Eliyce/paqad-ai/issues).
        - Check the [docs](https://docs.paqad.ai) to confirm the behavior is unexpected.
        - Run `paqad-ai doctor` and paste the output below.

  - type: input
    id: version
    attributes:
      label: paqad-ai version
      description: Output of `paqad-ai --version`.
      placeholder: e.g. 1.0.2
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v22.11.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other (specify in reproduction)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what you saw.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: A minimal set of steps another person can follow to reproduce.
      placeholder: |
        1. Run `paqad-ai onboard --stack <stack>`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Output of `paqad-ai doctor`
      description: Paste the full output. Redact any sensitive paths or values.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
