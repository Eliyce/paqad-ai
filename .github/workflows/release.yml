name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for the changesets bot:
#  - contents: write       -> create release commits, tags, GitHub releases
#  - pull-requests: write  -> open and update the "Version Packages" PR
#  - id-token: write       -> publish with provenance (npm verifies the build came from this repo)
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Guard against forked-repo pushes - secrets aren't available there.
    if: github.repository_owner == 'Eliyce'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install graph-ui dependencies
        run: pnpm --dir graph-ui install --frozen-lockfile

      # Pin to the 11.x line: Trusted Publishing needs npm >= 11.5.1, but a
      # moving @latest let npm 12 in, which changed `npm pack --json` output
      # and crashed the publish-time E2E (issue #332). A range floor keeps
      # provenance/OIDC working while excluding surprise breaking majors.
      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g "npm@>=11.5.1 <12"

      - name: Build
        run: pnpm run build

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          # PAT (not default GITHUB_TOKEN) so CI runs on the bot's release PR.
          # Workflow tokens cannot trigger downstream workflow runs.
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          # No NPM_TOKEN: publishes use Trusted Publishing (OIDC) configured at
          # https://www.npmjs.com/package/paqad-ai/access. The npm CLI exchanges
          # the workflow's id-token for short-lived publish credentials.
          NPM_CONFIG_PROVENANCE: 'true'
