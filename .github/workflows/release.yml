name: Release

on:
  push:
    branches: [main]

# Required permissions for the changesets bot:
#  - contents: write       -> create release commits, tags, GitHub releases
#  - pull-requests: write  -> open and update the "Version Packages" PR
#  - id-token: write       -> publish with provenance (npm verifies the build came from this repo)
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Guard against forked-repo pushes - secrets aren't available there.
    if: github.repository_owner == 'Eliyce'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install graph-ui dependencies
        run: pnpm --dir graph-ui install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
