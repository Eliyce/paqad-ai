name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [22, 24]
        include:
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # `expect` is required by the onboarding interactive PTY E2E
      # (tests/e2e/onboarding-interactive.e2e.test.ts) — a regression guard
      # for #62. macOS runners ship with it; ubuntu needs an explicit install;
      # the test skips itself on platforms where `expect` is absent.
      - name: Install expect (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install graph-ui dependencies
        run: pnpm --dir graph-ui install --frozen-lockfile

      - name: Pre-build (so e2e tests skip their own build step)
        run: pnpm run build

      - name: Run full CI script
        run: pnpm run ci
