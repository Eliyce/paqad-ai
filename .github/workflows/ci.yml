name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [22, 24]
        include:
          - os: macos-latest
            node: 22
          # Validation leg for #17: not in branch-protection required contexts
          # yet. Re-add to required checks once consistently green.
          - os: windows-latest
            node: 22
            experimental: true
        # Don't fail the whole matrix if windows-latest fails — it's still
        # being stabilized. Once green for ~10 PR runs, remove this and add
        # back to branch protection.
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install graph-ui dependencies
        run: pnpm --dir graph-ui install --frozen-lockfile

      - name: Pre-build (so e2e tests skip their own build step)
        run: pnpm run build

      - name: Run full CI script
        run: pnpm run ci
