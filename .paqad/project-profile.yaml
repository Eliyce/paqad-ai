project:
  name: paqad project
  id: paqad-project
  description: Generated by paqad-ai
commands:
  install: pnpm install
  dev: pnpm dev
  test: pnpm test -- --reporter=tap
  test_single: pnpm test -- <pattern> --reporter=tap
  lint: pnpm lint
  format: pnpm format
  migrate: echo "configure migrate command"
  build: pnpm build
compliance_packs: []
mcp:
  servers: []
custom:
  classification_dimensions: []
  verification_plugins: []
  escalation_rules: []
active_capabilities:
  - content
  - coding
  - security
stack_profile:
  frameworks:
    - react
  traits:
    - tailwind
    - vite-spa
    - vitest
  toolchains:
    - ecosystem: node
      package_manager: pnpm
      lockfile: pnpm-lock.yaml
    - ecosystem: node
      package_manager: npm
      lockfile: package-lock.json
    - ecosystem: node
      package_manager: pnpm
      lockfile: graph-ui/pnpm-lock.yaml
    - ecosystem: node
      package_manager: npm
      lockfile: graph-ui/package-lock.json
  version_bands:
    - name: react:^19
      package_name: react
      range: ^19
      locked_version: ^19.0.0
      source: manifest
    - name: tailwindcss:^4
      package_name: tailwindcss
      range: ^4
      locked_version: ^4.0.0
      source: manifest
  sources:
    - file: graph-ui/package.json
      kind: manifest
      detail: Used for stack detection and version resolution
    - file: graph-ui/pnpm-lock.yaml
      kind: lockfile
      detail: Used for stack detection and version resolution
    - file: package.json
      kind: manifest
      detail: Used for stack detection and version resolution
    - file: pnpm-lock.yaml
      kind: lockfile
      detail: Used for stack detection and version resolution
